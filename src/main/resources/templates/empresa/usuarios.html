<html lang="pt-br"
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{template}">

<head>
	<title>Usuarios</title>
</head>

<body>
	<div layout:fragment="conteudo">
		<div class="container py-3">
			<div class="card mb-3">
				<div class="card-header">Cadastro de usuario</div>
				<form th:action="@{/empresa/usuarios}" method="post">
					<div class="card-body row g-3">
						<input type="hidden" name="id" th:value="${form.id}">
						<div class="col-md-4">
							<label class="form-label">Nome completo</label>
							<input class="form-control" name="nomeCompleto" th:value="${form.nomeCompleto}" required>
						</div>
						<div class="col-md-3">
							<label class="form-label">Login</label>
							<input class="form-control" name="usuario" th:value="${form.usuario}" required>
						</div>
						<div class="col-md-2">
							<label class="form-label">Senha</label>
							<input type="password" class="form-control" name="senha">
						</div>
						<div class="col-md-2">
							<label class="form-label">Confirmar senha</label>
							<input type="password" class="form-control" name="confirmeSenha">
						</div>
						<div class="col-md-1 d-flex align-items-end">
							<div class="form-check">
								<input class="form-check-input" type="checkbox" name="ativo" th:checked="${form.ativo}">
								<label class="form-check-label">Ativo</label>
							</div>
						</div>
						<div class="col-12">
							<label class="form-label">Perfis</label>
							<select class="form-select" name="perfilIds" multiple size="4" required>
								<option th:each="perfil : ${perfis}"
									th:value="${perfil.id}"
									th:text="${perfil.nome}"
									th:selected="${form.perfilIds != null and #lists.contains(form.perfilIds, perfil.id)}"></option>
							</select>
							<small class="text-muted">Use Ctrl para selecionar mais de um perfil.</small>
						</div>
						<div class="col-12 text-end">
							<button class="btn btn-success" type="submit">Salvar</button>
						</div>
					</div>
				</form>
			</div>

			<div class="card">
				<div class="card-header">Usuarios da empresa</div>
				<div class="card-body">
					<table class="table table-striped table-sm align-middle">
						<thead>
							<tr>
								<th>ID</th>
								<th>Nome</th>
								<th>Login</th>
								<th>Perfis</th>
								<th>Ativo</th>
								<th class="text-end">Editar</th>
								<th class="text-end">Excluir</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="usuario : ${usuarios}">
								<td th:text="${usuario.id}"></td>
								<td th:text="${usuario.nomeCompleto}"></td>
								<td th:text="${usuario.usuario}"></td>
								<td th:text="${#strings.listJoin(usuario.perfis.![nome], ', ')}"></td>
								<td th:text="${usuario.ativo ? 'Sim' : 'Nao'}"></td>
								<td class="text-end">
									<a class="btn btn-primary btn-sm" th:href="@{/empresa/usuarios(id=${usuario.id})}">
										<i class="bi bi-pencil-square"></i>
									</a>
								</td>
								<td class="text-end">
									<form th:action="@{/empresa/usuarios/excluir}" method="post">
										<input type="hidden" name="id" th:value="${usuario.id}">
										<button type="submit" class="btn btn-danger btn-sm" th:data-nome="${usuario.nomeCompleto}" onclick="return confirmarExclusao(this)">
											<i class="bi bi-trash3-fill"></i>
										</button>
									</form>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
