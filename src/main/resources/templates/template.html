<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="shortcut icon" th:href="@{/assets/favicon.ico}" type="image/x-icon">
	<meta name="_csrf" th:if="${_csrf != null}" th:content="${_csrf.token}">
	<meta name="_csrf_header" th:if="${_csrf != null}" th:content="${_csrf.headerName}">

	<link rel="stylesheet" th:href="@{/css/global.css}" type="text/css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-table@1.24.2/dist/bootstrap-table.min.css">
</head>

<body>
	<div th:replace="~{componentes/_mensagens.html :: mensagens}"></div>
	<div th:replace="~{componentes/_sidebar.html :: sidebar}" sec:authorize="isAuthenticated()"></div>
	<div th:if="${#lists.isEmpty(versoesPendentes) == false}" sec:authorize="isAuthenticated()">
		<div class="modal fade" id="modal-versao-sistema" tabindex="-1" aria-hidden="true">
			<div class="modal-dialog modal-dialog-centered">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title" id="versao-sistema-titulo"></h5>
					</div>
					<div class="modal-body">
						<p class="mb-0" id="versao-sistema-descricao" style="white-space: pre-line;"></p>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-primary" id="btn-confirmar-versao">Entendi</button>
					</div>
				</div>
			</div>
		</div>
		<script id="versoes-pendentes-data" type="application/json" th:text="${versoesPendentesJson}"></script>
	</div>

	<div class="tpl-conteudo" layout:fragment="conteudo"></div>

	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap-table@1.24.2/dist/bootstrap-table.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap-table@1.24.2/dist/locale/bootstrap-table-pt-BR.min.js"></script>
	<script type="text/javascript" th:src="@{/js/imports.js}"></script>
</body>
</html>
