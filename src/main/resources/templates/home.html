<html lang="pt-br"
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{template}">

<head>
	<title>Home</title>
	<link rel="stylesheet" th:href="@{/css/home.css}" type="text/css">
</head>

<body>
	<div layout:fragment="conteudo">
		<div class="container py-4">
			<div class="row g-3">
				<div class="col-md-6">
					<div class="card">
						<div class="card-body">
							<h3 class="card-title" th:text="${adminSaas ? 'Painel SaaS' : (empresaAtual != null ? empresaAtual.nomeFantasia : 'Sistema de Gestao')}"></h3>
							<p class="card-text mb-1" th:text="${usuarioLogado != null ? 'Usuario: ' + usuarioLogado.nomeCompleto : ''}"></p>
							<p class="card-text mb-0" th:if="${empresaAtual != null}" th:text="${'Plano: ' + empresaAtual.plano + ' | Status: ' + empresaAtual.status}"></p>
						</div>
					</div>
				</div>
				<div class="col-md-6">
					<div class="card">
						<div class="card-body">
							<h5 class="card-title">Proximos passos</h5>
							<p class="card-text mb-2" th:if="${adminSaas}">Cadastre empresas, crie administradores iniciais e acompanhe o status das lojas.</p>
							<p class="card-text mb-2" th:unless="${adminSaas}">Gerencie usuarios da sua empresa e mantenha os cadastros isolados por loja.</p>
							<a th:if="${adminSaas}" th:href="@{/admin/empresas}" class="btn btn-primary">Ir para empresas</a>
							<a th:unless="${adminSaas}" th:href="@{/empresa/usuarios}" class="btn btn-primary">Ir para usuarios</a>
						</div>
					</div>
				</div>
			</div>
		</div>
		<script type="module" th:src="@{/js/home.js}"></script>
	</div>
</body>
</html>
