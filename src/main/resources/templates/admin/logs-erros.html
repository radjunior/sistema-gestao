<html lang="pt-br"
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{template}">

<head>
	<title>Logs de Erros</title>
</head>

<body>
	<div layout:fragment="conteudo">
		<div class="container py-3">
			<div class="card mb-3">
				<div class="card-header">Filtros</div>
				<form th:action="@{/admin/logs-erros}" method="get">
					<div class="card-body row g-3 align-items-end">
						<div class="col-md-2">
							<label class="form-label">Filtrar por</label>
							<select class="form-select" name="filtro">
								<option value="mensagem" th:selected="${filtroSelecionado == 'mensagem'}">Mensagem</option>
								<option value="classe" th:selected="${filtroSelecionado == 'classe'}">Classe</option>
							</select>
						</div>
						<div class="col-md-8">
							<label class="form-label">Termo</label>
							<input type="text" class="form-control" name="termo" th:value="${termo}">
						</div>
						<div class="col-md-2">
							<button class="btn btn-primary w-100" type="submit">Filtrar</button>
						</div>
					</div>
				</form>
			</div>

			<div class="card">
				<div class="card-header">Ultimos erros</div>
				<div class="card-body">
					<div class="table-responsive">
						<table class="table table-striped table-sm align-middle">
							<thead>
								<tr>
									<th>Data/Hora</th>
									<th>Classe</th>
									<th>Mensagem</th>
									<th>Usuario</th>
									<th>Empresa</th>
									<th>Rota</th>
									<th>Detalhe</th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="log : ${logs}">
									<td th:text="${#temporals.format(log.dataHora, 'dd/MM/yyyy HH:mm:ss')}"></td>
									<td th:text="${log.classeExcecao}"></td>
									<td th:text="${log.mensagem}"></td>
									<td th:text="${log.loginUsuario}"></td>
									<td th:text="${log.empresa != null ? log.empresa.nomeFantasia : ''}"></td>
									<td th:text="${log.metodoHttp + ' ' + log.url}"></td>
									<td>
										<details>
											<summary>Ver pilha</summary>
											<pre class="mt-2 mb-0" style="white-space: pre-wrap;" th:text="${log.stackTrace}"></pre>
										</details>
									</td>
								</tr>
								<tr th:if="${#lists.isEmpty(logs)}">
									<td colspan="7" class="text-center">Nenhum erro encontrado.</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
