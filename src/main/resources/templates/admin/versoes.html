<html lang="pt-br"
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{template}">

<head>
	<title>Versoes</title>
</head>

<body>
	<div layout:fragment="conteudo">
		<div class="container py-3">
			<div class="card mb-3">
				<div class="card-header">Cadastro de versao</div>
				<form th:action="@{/admin/versoes}" method="post">
					<div class="card-body row g-3">
						<div class="col-md-1">
							<label class="form-label">ID</label>
							<input type="text" class="form-control" name="id" th:value="${versao?.id}">
						</div>
						<div class="col-md-11">
							<label class="form-label">Titulo</label>
							<input type="text" class="form-control" name="titulo" th:value="${versao?.titulo}">
						</div>
						<div class="col-md-12">
							<label class="form-label">Descricao</label>
							<textarea class="form-control" name="descricao" rows="5" th:text="${versao?.descricao}"></textarea>
						</div>
						<div class="col-12 text-end">
							<button class="btn btn-success" type="submit">Salvar</button>
						</div>
					</div>
				</form>
			</div>
			<div class="card">
				<div class="card-header">Historico de versoes</div>
				<div class="card-body">
					<table class="table table-striped table-sm">
						<thead>
							<tr>
								<th>ID</th>
								<th>Titulo</th>
								<th>Descricao</th>
								<th class="text-end">Editar</th>
								<th class="text-end">Excluir</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="item : ${versoes}">
								<td th:text="${item.id}"></td>
								<td th:text="${item.titulo}"></td>
								<td th:text="${item.descricao}"></td>
								<td class="text-end">
									<a class="btn btn-primary btn-sm" th:href="@{/admin/versoes(id=${item.id})}">
										<i class="bi bi-pencil-square"></i>
									</a>
								</td>
								<td class="text-end">
									<form th:action="@{/admin/versoes/excluir}" method="post">
										<input type="hidden" name="id" th:value="${item.id}">
										<button type="submit" class="btn btn-danger btn-sm" th:data-nome="${item.titulo}" onclick="return confirmarExclusao(this)">
											<i class="bi bi-trash3-fill"></i>
										</button>
									</form>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
