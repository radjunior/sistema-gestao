<html lang="pt-br"
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{template}">

<head>
	<title>Versoes</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
	<style>
		.EasyMDEContainer .CodeMirror {
			min-height: 180px;
			font-size: 0.9rem;
			border-radius: 0 0 6px 6px;
		}
		.editor-toolbar {
			border-radius: 6px 6px 0 0;
		}
		[data-theme="dark"] .EasyMDEContainer .CodeMirror {
			background: #1e1e2e;
			color: #cdd6f4;
			border-color: #45475a;
		}
		[data-theme="dark"] .editor-toolbar {
			background: #181825;
			border-color: #45475a;
		}
		[data-theme="dark"] .editor-toolbar button {
			color: #cdd6f4 !important;
		}
		[data-theme="dark"] .editor-toolbar button:hover,
		[data-theme="dark"] .editor-toolbar button.active {
			background: #313244;
		}
		.descricao-preview {
			max-height: 120px;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
			max-width: 420px;
			color: #6c757d;
			font-size: 0.82rem;
		}
	</style>
</head>

<body>
	<div layout:fragment="conteudo">
		<div class="container py-3">
			<div class="card mb-3">
				<div class="card-header">Cadastro de versão</div>
				<form th:action="@{/admin/versoes}" method="post">
					<div class="card-body row g-3">
						<div class="col-md-1">
							<label class="form-label">ID</label>
							<input type="text" class="form-control" name="id" th:value="${versao?.id}" readonly>
						</div>
						<div class="col-md-11">
							<label class="form-label">Título</label>
							<input type="text" class="form-control" name="titulo" th:value="${versao?.titulo}" placeholder="Ex: v2.9.0 — Melhorias no financeiro">
						</div>
						<div class="col-md-12">
							<label class="form-label">
								Descrição
								<span class="text-muted fw-normal ms-1" style="font-size:0.8rem;">— suporta Markdown: **negrito**, *itálico*, listas, etc.</span>
							</label>
							<textarea id="editor-descricao" name="descricao" th:text="${versao?.descricao}"></textarea>
						</div>
						<div class="col-12 d-flex gap-2 justify-content-end">
							<a th:href="@{/admin/versoes}" class="btn btn-secondary" th:if="${versao?.id != null}">Cancelar</a>
							<button class="btn btn-success" type="submit">Salvar</button>
						</div>
					</div>
				</form>
			</div>

			<div class="card">
				<div class="card-header">Histórico de versões</div>
				<div class="card-body">
					<table class="table table-striped table-sm align-middle">
						<thead>
							<tr>
								<th style="width:60px">ID</th>
								<th>Título</th>
								<th>Descrição</th>
								<th class="text-end" style="width:80px">Editar</th>
								<th class="text-end" style="width:80px">Excluir</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="item : ${versoes}">
								<td th:text="${item.id}"></td>
								<td th:text="${item.titulo}"></td>
								<td>
									<span class="descricao-preview" th:text="${item.descricao}"></span>
								</td>
								<td class="text-end">
									<a class="btn btn-primary btn-sm" th:href="@{/admin/versoes(id=${item.id})}">
										<i class="bi bi-pencil-square"></i>
									</a>
								</td>
								<td class="text-end">
									<form th:action="@{/admin/versoes/excluir}" method="post">
										<input type="hidden" name="id" th:value="${item.id}">
										<button type="submit" class="btn btn-danger btn-sm"
											th:data-nome="${item.titulo}"
											onclick="return confirmarExclusao(this)">
											<i class="bi bi-trash3-fill"></i>
										</button>
									</form>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
		<script>
			document.addEventListener("DOMContentLoaded", function () {
				const easyMDE = new EasyMDE({
					element: document.getElementById("editor-descricao"),
					spellChecker: false,
					autofocus: false,
					placeholder: "Descreva as mudanças desta versão...\n\n**Exemplo:**\n- Corrigido bug no PDV\n- **Nova funcionalidade:** relatório de vendas",
					toolbar: [
						"bold", "italic", "heading-2", "heading-3",
						"|",
						"unordered-list", "ordered-list",
						"|",
						"quote", "code",
						"|",
						"preview", "side-by-side", "fullscreen"
					],
					previewRender: function (plainText) {
						if (typeof marked !== "undefined" && marked.parse) {
							return marked.parse(plainText, { breaks: true, gfm: true });
						}
						return plainText;
					},
					status: false
				});
			});
		</script>
	</div>
</body>
</html>
