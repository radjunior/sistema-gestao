<html lang="pt-br"
	  xmlns:th="http://www.thymeleaf.org"
	  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	  layout:decorate="~{template}">

<head>
	<title>Contas a Pagar - Cadastro</title>
	<link rel="stylesheet" th:href="@{/css/contas-pagar.css}" type="text/css">
</head>

<body>
	<div layout:fragment="conteudo">
		<div class="container-fluid">
			<div class="card mt-3">
				<div class="card-header d-flex justify-content-between align-items-center">
					<span>
						<i class="bi bi-file-earmark-plus"></i>
						<span th:text="${titulo == null ? 'Novo Titulo a Pagar' : 'Editar Titulo a Pagar'}"></span>
					</span>
					<a th:href="@{/financeiro/contas-pagar}" class="btn btn-sm btn-secondary">
						<i class="bi bi-arrow-left"></i> Voltar
					</a>
				</div>
				<form th:action="@{/financeiro/contas-pagar/salvar}" method="post">
					<div class="card-body row g-3">
						<input type="hidden" name="id" th:if="${titulo != null}" th:value="${titulo.id}">

						<div class="col-md-4">
							<label class="form-label">Fornecedor</label>
							<select class="form-select" name="fornecedorId">
								<option value="">(Sem fornecedor)</option>
								<option th:each="f : ${fornecedores}" th:value="${f.id}" th:text="${f.nome}"
										th:selected="${titulo != null and titulo.fornecedor != null and titulo.fornecedor.id == f.id}"></option>
							</select>
						</div>
						<div class="col-md-4">
							<label class="form-label">Categoria *</label>
							<select class="form-select" name="categoriaDespesa" required>
								<option th:each="c : ${categorias}" th:value="${c.name()}" th:text="${c.descricao}"
										th:selected="${titulo != null and titulo.categoriaDespesa.name() == c.name()}"></option>
							</select>
						</div>
						<div class="col-md-4">
							<label class="form-label">Documento</label>
							<input type="text" class="form-control" name="documento"
								   th:value="${titulo?.documento}" maxlength="60" placeholder="NF, boleto, etc.">
						</div>

						<div class="col-md-12">
							<label class="form-label">Descricao *</label>
							<input type="text" class="form-control" name="descricao"
								   th:value="${titulo?.descricao}" maxlength="200" required>
						</div>

						<div class="col-md-3">
							<label class="form-label">Valor Total *</label>
							<input type="number" step="0.01" min="0.01" class="form-control" name="valorTotal"
								   th:value="${titulo?.valorNominal}" required>
						</div>
						<div class="col-md-2">
							<label class="form-label">Parcelas</label>
							<input type="number" min="1" max="60" class="form-control" name="totalParcelas"
								   th:value="${titulo != null ? titulo.totalParcelas : 1}"
								   th:readonly="${titulo != null}">
							<small class="text-muted" th:if="${titulo != null}">Edicao nao altera parcelamento.</small>
						</div>
						<div class="col-md-3">
							<label class="form-label">Data de Emissao</label>
							<input type="date" class="form-control" name="dataEmissao"
								   th:value="${titulo?.dataEmissao}">
						</div>
						<div class="col-md-4">
							<label class="form-label">1o Vencimento *</label>
							<input type="date" class="form-control" name="dataPrimeiroVencimento"
								   th:value="${titulo != null ? titulo.dataVencimento : hoje}" required>
						</div>

						<div class="col-12">
							<label class="form-label">Observacao</label>
							<textarea class="form-control" name="observacao" rows="2" maxlength="500"
									  th:text="${titulo?.observacao}"></textarea>
						</div>

						<div class="col-12 d-flex justify-content-between">
							<form th:if="${titulo != null}"
								  th:action="@{/financeiro/contas-pagar/excluir/{id}(id=${titulo.id})}" method="post"
								  onsubmit="return confirm('Excluir este titulo?');" style="display:inline;">
								<button type="submit" class="btn btn-outline-danger">
									<i class="bi bi-trash"></i> Excluir
								</button>
							</form>
							<span th:unless="${titulo != null}"></span>
							<button type="submit" class="btn btn-success">
								<i class="bi bi-check2"></i> Salvar
							</button>
						</div>
					</div>
				</form>
			</div>
		</div>
	</div>
</body>
</html>
